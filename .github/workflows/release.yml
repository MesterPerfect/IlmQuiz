name: IlmQuiz Professional Build Pipeline

on:
  push:
    branches:
      - release

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false 
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Stable version for PySide6

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable (All Platforms)
        run: |
          # نستخدم PyInstaller لإنشاء مجلد يحتوي على الملف التنفيذي وكل الملحقات
          python -m PyInstaller --noconfirm --onedir --windowed --name "IlmQuiz" --add-data "assets${{ matrix.os == 'windows-latest' && ';' || ':' }}assets" main.py

      - name: Build Inno Setup Installer (Windows Only)
        if: matrix.os == 'windows-latest'
        run: |
          # استدعاء مترجم Inno Setup لبناء ملف الـ Setup.exe
          # تأكد أن ملف .iss يشير إلى مجلد dist/IlmQuiz/
          iscc ilmquiz_setup.iss

      - name: Package Artifacts (Windows Portable)
        if: matrix.os == 'windows-latest'
        run: |
          python -m zipfile -c IlmQuiz_Windows_Portable.zip dist/IlmQuiz/
          # سنقوم برفع كل من الـ Zip والـ Setup.exe (الذي ينتجه Inno Setup عادة في مجلد Output)

      - name: Package Artifacts (macOS & Linux)
        if: matrix.os != 'windows-latest'
        run: |
          cd dist
          tar -czvf ../IlmQuiz_${{ matrix.os }}.tar.gz IlmQuiz/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            *.zip
            *.tar.gz
            Output/*.exe

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Extract Version
        id: release_info
        run: |
          # استخراج النسخة كما في مشروعك السابق
          export APP_VERSION=$(python -c "import sys; sys.path.append('.'); from core.constants import APP_VERSION; print(APP_VERSION)")
          echo "TAG_NAME=v${APP_VERSION}" >> $GITHUB_ENV
          echo "RELEASE_NAME=IlmQuiz v${APP_VERSION}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.RELEASE_NAME }}
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
            artifacts/*.exe
          generate_release_notes: true

name: Build and Release IlmQuiz

on:
  push:
    # Trigger only when pushing to the specific release branch or on version tags
    branches:
      - 'release'
    tags:
      - 'v*'

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Define cross-platform build targets
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Use a stable Python version for PySide6

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          # The command assumes your main entry point is main.py
          # Adjust --add-data based on your OS separator (; for Win, : for Unix)
          python -m PyInstaller --noconfirm --onedir --windowed --name "IlmQuiz" --add-data "assets${{ matrix.os == 'windows-latest' && ';' || ':' }}assets" main.py

      - name: Package Artifacts (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          powershell Compress-Archive -Path dist/IlmQuiz -DestinationPath IlmQuiz_Windows_v1.0.0.zip

      - name: Package Artifacts (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: |
          cd dist && tar -czvf ../IlmQuiz_${{ matrix.os }}_v1.0.0.tar.gz IlmQuiz/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: IlmQuiz_*.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            **/IlmQuiz_*.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
